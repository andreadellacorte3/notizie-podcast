name: Genera Podcast Notizie

on:
  schedule:
    # Ogni giorno alle 4:00 UTC = 5:00 ora italiana invernale, 6:00 in estate
    - cron: "0 4 * * *"
  workflow_dispatch: # permette di avviare manualmente dal sito

jobs:
  genera:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4 edge-tts

      - name: Genera podcast
        run: python genera_cloud.py
        env:
          CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
          CARTESIA_VOICE_ID: ${{ secrets.CARTESIA_VOICE_ID }}

      - name: Pubblica su GitHub Pages
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add docs/
          git diff --staged --quiet || git commit -m "Podcast $(date +%Y-%m-%d)"
          git push
