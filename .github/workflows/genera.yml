name: Genera Podcast Notizie

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  genera:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4 edge-tts
      - run: python genera_cloud.py
      - run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add docs/
          git diff --staged --quiet || git commit -m "Podcast $(date +%Y-%m-%d)"
          git push
